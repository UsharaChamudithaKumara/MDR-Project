version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: mdr-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: mdr_system
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./mdr-backend/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./mdr-backend
    container_name: mdr-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - JWT_SECRET=MDR_SYSTEM_SECRET_2026_KEY_PROD
      - DB_HOST=db
      - DB_USER=root
      - DB_PASS=root
      - DB_NAME=mdr_system
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./mdr-backend/server/uploads:/app/server/uploads

  frontend:
    build: ./mdr-frontend
    container_name: mdr-frontend
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  db_data:
